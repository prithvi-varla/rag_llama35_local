app:
  name: rag-llama35-local
  env: dev
  log_level: INFO

model:
  target_model: "meta-llama/Llama-3.2-3B-Instruct"
  requested_size_note: "Requested as llama 3.5B class; this project defaults to the closest broadly available 3B Llama family local model."
  temperature: 0.1
  max_new_tokens: 384

inference:
  engine: "mlx"  # mlx | vllm | mock
  mlx:
    model_path: "mlx-community/Llama-3.2-3B-Instruct-4bit"
  vllm:
    base_url: "http://127.0.0.1:8001/v1"
    api_key: "EMPTY"

retrieval:
  top_k: 5
  bm25_top_k: 12
  dense_top_k: 12
  rerank_top_k: 5
  chunk_size_chars: 550
  chunk_overlap_chars: 90
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

validation:
  enforce_citations: true
  min_supported_chunks: 1
  min_relevance_score: 0.25

observability:
  enabled: true
  langfuse_public_key: "pk-lf-42e88a3f-9965-46ea-a56d-af9d25836777"
  langfuse_secret_key: "sk-lf-ef1dd951-56d1-4334-bec9-daec3513d195"
  langfuse_host: "https://us.cloud.langfuse.com"
  debug: false
  

paths:
  corpus_path: "data/corpus.jsonl"
  eval_path: "data/eval_queries.jsonl"
  output_dir: "outputs"
